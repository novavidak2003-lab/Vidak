    <h2>1.1 A Streamer-fejek Keletkezése és Fizikai Jellemzői</h2>
    <p>A hagyományos vonalas villámok plazmacsatornájának hőmérséklete eléri a <span class="math">30 000 K</span>-t. Ezzel szemben a gömbvillámok belső energiája nagyságrendekkel alacsonyabb, áramuk mindössze <span class="math">100 A</span> vagy néhány <span class="math">100 A</span>, belső hőmérsékletük pedig csupán <span class="math">1000 K – 2000 K</span>. Töltésük meglepően kicsi: mindössze néhány <span class="math">nC – μC</span> (<span class="math">10⁻⁷ – 10⁻⁶ C</span>).</p>

    <p>A gömbvillámok keletkezésének kiindulópontját a talajról induló láthatatlan villám-előkisülések, a <strong>streamerek</strong> képezik. A streamer-fej kialakulásához zivataros, párás levegőben kb. <span class="math">4 – 10 kV/cm</span> (száraz levegőben <span class="math">30 kV/cm</span>) elektromos térerősség szükséges.</p>

    <div class="formula-box">
        <div class="formula-title">A Streamer-Fej Fizikai Paraméterei</div>
        • <strong>Szabad elektron sűrűség:</strong> <span class="math">n_e = 10¹⁴ – 10¹⁵ db/cm³</span><br>
        • <strong>Plazma hőmérséklet:</strong> <span class="math">T_p = 1000 – 2000 K</span> (kb. <span class="math">700 – 1700 °C</span>)<br>
        • <strong>Kezdeti sugár:</strong> <span class="math">r_0 = 0.1 – 1.0 mm</span> (vékony filamentum)<br>
        • <strong>Terjedési sebesség:</strong> <span class="math">v = 10⁵ – 10⁶ m/s</span> (a fénysebesség kb. egyharmada)<br>
        • <strong>Elektronenergia a tipnél:</strong> <span class="math">E_e = 10 – 100 keV</span> (elegendő a molekulák ionizációjához)
    </div>

    <p>A pozitív töltésű pre-villámok magasabb energiájúak, mint a negatív elektronvillámok. A félvezetőkben megfigyelhető lyukvezetéshez hasonlóan az elektronhiány mozog felfelé, míg a nehéz pozitív ionok szinte mozdulatlanok maradnak. Ez a self-sustaining streamer-fej láthatatlanul, a perceptuális küszöb feletti sebességgel halad.</p>

    <h2>1.2 A Yukawa-Porplazma Modell és Debye-Árnyékolás</h2>
    <p>A lineáris streamer filamentum az eredeti formájában sérülékeny lenne a Rayleigh-Plateau instabilitással szemben. A gömbi forma kialakulásáért és hosszú távú stabilitásáért a <strong>strongly coupled Yukawa-porplazma</strong> dinamikája a felelős.</p>

    <p>A plazmába belépő mikrométeres pára- és porszemcsék a szabad elektronok elfogásával nagy negatív töltést szereznek. A szemcsék közötti elektrosztatikus taszítást a környező pozitív ionok árnyékolják, amelyet a <strong>Yukawa-potenciál</strong> ír le:</p>

    <div class="formula-box">
        <div class="formula-title">Yukawa-Potenciál Egyenlete</div>
        <div style="text-align: center; margin: 8px 0;">
            <span class="math" style="font-size: 12pt;">U(r) = (q / 4π ε₀ r) · e^(-r / λ_D)</span>
        </div>
        ahol <span class="math">q</span> a szemcse töltése, <span class="math">r</span> a távolság, és <span class="math">λ_D</span> a Debye-árnyékolási hossz.
    </div>

    <p>Erős csatolás esetén a potenciális energia messze meghaladja a termikus mozgási energiát. A porplazma ekkor nem gázként, hanem sűrű folyadékként viselkedik. A porfelhő belsejében lévő részecskékre szimmetrikus erő hat, míg a határfelületen lévőkre befelé mutató eredő erő hat, ami makroszkopikus <strong>felületi feszültséget</strong> eredményez (<span class="math">σ = 10⁻⁴ – 10⁻² J/m²</span>).</p>

    <h2>1.3 Rayleigh-Plateau Instabilitás Elnyomása</h2>
    <p>A belső termikus és elektrosztatikus tágulási nyomást a felületi feszültség tartja egyensúlyban a módosított <strong>Laplace-egyenlet</strong> szerint:</p>

    <div class="formula-box">
        <div class="formula-title">Módosított Laplace-Nyomás Egyenlete</div>
        <div style="text-align: center; margin: 8px 0;">
            <span class="math" style="font-size: 12pt;">ΔP = 4σ / d</span>
        </div>
        ahol <span class="math">ΔP</span> a belső túlnyomás, <span class="math">σ</span> a felületi feszültségi együttható, és <span class="math">d</span> a gömb átmérője.
    </div>

    <p>A megnövekedett belső viszkozitás és felületi feszültség elnyomja a Rayleigh-Plateau instabilitást, így a filamentum nem esik szét apró cseppekre, hanem stabil makroszkopikus gömbbé húzódik össze.</p>

    <h2>1.4 Hydroxil Gyökök (•OH, •HO₂) Kémiai Fűtési Mechanizmusa</h2>
    <p>A gömbvillám élettartamát (10 – 200 másodperc) és világítását belső kémiai üzemanyag tartja fenn. A streamer-fejben lévő <span class="math">10 – 100 keV</span> energiájú elektronok elhasítják a levegőben lévő <span class="math">H₂O</span> molekulákat, aminek hatására hatalmas mennyiségű <strong>hydroxil (•OH)</strong> és <strong>perhydroxil (•HO₂)</strong> gyök keletkezik.</p>

    <div class="formula-box">
        <div class="formula-title">Egzoterm Rekombinációs Láncreakció</div>
        <div style="text-align: center; margin: 6px 0;">
            <span class="math">•OH + •OH → H₂O₂ → H₂O + ½ O₂ + Hő (Recomb.)</span>
        </div>
        A vízmolekulák felhasadása energiaigényes, de az újraegyesülésük (rekombinációjuk) során ez az energia folyamatos hő és fény formájában szabadul fel.
    </div>

    <h2>1.5 Hőmérsékleti Plató és Önregulációs Visszacsatolás</h2>
    <p>A gömbvillám hűlési görbéje nem exponenciális, hanem egy időben megnyújtott <strong>platóval</strong> rendelkezik. Ha a gömb hűlni kezd, sűrűsége nő, a Yukawa-porplazma részecskéi közelebb kerülnek egymáshoz. Ez megnöveli a helyi ütközési számot, ami gyorsítja a kémiai reakciósebtséget és visszamelegíti a rendszert. Ez az belső visszacsatolási kör stabilizálja a <span class="math">1000 K – 2000 K</span> közötti hőmérsékletet.</p>

    <h2>1.6 Neutrális Lebegés és Termodinamikai Számítások (40 cm Modell)</h2>
    <p>Ahhoz, meggátoljuk a forró gáz gyors felszállását vagy eloszlását, a gömb belső tömegének pontosan meg kell egyeznie a kiszorított hideg levegő tömegével.</p>

