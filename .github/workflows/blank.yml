   * **Rayleigh-Plateau instabilitás elnyomása:** Módosított Laplace-nyomás (\Delta P = \frac{4\sigma}{d}).
   * **Kémiai fűtési mechanizmus:** Hydroxil (\cdot\text{OH}) és perhydroxil (\cdot\text{HO}_2) gyökök rekombinációja (300\text{--}400\text{ W} fűtőteljesítmény).
   * **Termodinamikai neutrális lebegési modell (40\text{ cm}-es gömb):** 33.5\text{ L} térfogat, 40.2\text{ g} kiszorított levegő, 11.7\text{ g} belső gáz, 28.5\text{ g} pára / gyök tömeg.
   * **Anomáliák magyarázata:** Üvegablakon való áthatolás, ózon és salétromsav képződés, csendes elpárolgás vs. robbanásszerű rekombináció.
